name: Azure Static Web Apps CI/CD

# Combined "AEP Games" deploy: builds two fully independent Vite apps into
# subpaths under one Static Web App, behind a static launcher.
#   /              -> launcher/index.html
#   /cap-table/    -> Cap Table Catastrophe (repo root, base=/cap-table/)
#   /family-feud/  -> Equity Family Feud   (family-feud/,  base=/family-feud/)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Cap Table Catastrophe (base=/cap-table/)
        run: |
          npm ci
          npm run build

      - name: Build Equity Family Feud (base=/family-feud/)
        working-directory: family-feud
        run: |
          npm ci
          npm run build

      - name: Assemble combined site
        run: |
          rm -rf combined
          mkdir -p combined/cap-table combined/family-feud
          cp -r dist/. combined/cap-table/
          cp -r family-feud/dist/. combined/family-feud/
          cp -r launcher/. combined/
          cp staticwebapp.config.json combined/staticwebapp.config.json
          echo "---- combined tree (top 2 levels) ----"
          find combined -maxdepth 2 -mindepth 1 | sort

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_MEADOW_0769DF110 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "combined"
          api_location: ""
          output_location: ""
          skip_app_build: true
          skip_api_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_MEADOW_0769DF110 }}
          action: "close"
